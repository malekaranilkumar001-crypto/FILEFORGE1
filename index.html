            { question: 'Will the image quality be reduced in the PDF?', answer: 'No. FileForge embeds your images in the PDF at their original quality. No additional compression is applied during JPG to PDF conversion.' },
            { question: 'Can I convert PNG images to PDF with this tool?', answer: 'Yes. Although called JPG to PDF, FileForge also accepts PNG files and converts them to PDF automatically.' }
          ],
          '/word-to-pdf': [
            { question: 'Do I need Microsoft Word to convert DOCX to PDF?', answer: 'No. FileForge converts Word documents to PDF entirely in your browser using open-source JavaScript libraries. No Microsoft Office subscription is needed.' },
            { question: 'Will my Word document formatting be preserved in the PDF?', answer: 'FileForge preserves basic formatting including paragraphs, headings, bold, italic, lists, and basic tables. Complex features like custom fonts and advanced table formatting may not convert perfectly.' },
            { question: 'Can I convert multiple Word files to PDF at once?', answer: 'Yes. Enable Batch Mode to upload up to 20 DOCX files and convert them all simultaneously. Download as a ZIP file when complete.' },
            { question: 'Is a .doc file (older Word format) supported?', answer: 'FileForge currently supports .docx format (Word 2007 and later). Older .doc files can be converted to .docx using LibreOffice (free) or Google Docs before uploading.' },
            { question: 'What is the maximum file size for Word to PDF conversion?', answer: 'FileForge handles Word documents up to approximately 50MB without issues. Very large documents with many embedded images may be slower to process.' }
          ],
          '/excel-to-pdf': [
            { question: 'Will my Excel formulas be visible in the PDF?', answer: 'The PDF shows the calculated values of your formulas, not the formula code itself. This is the same behavior as printing from Excel.' },
            { question: 'Can I convert multiple Excel sheets to PDF?', answer: 'FileForge currently converts the first sheet of each Excel file to PDF. As a workaround, copy each sheet into a separate file and convert individually, then merge with FileForge Merge PDF.' },
            { question: 'Does FileForge support .xls files (older Excel format)?', answer: 'Yes. FileForge supports both .xlsx (Excel 2007+) and the older .xls format using the SheetJS library.' },
            { question: 'My Excel file has charts — will they appear in the PDF?', answer: 'Charts may not render fully as the browser-based Excel reader focuses on cell data. For spreadsheets with important charts, use Excel built-in Save as PDF for the most accurate chart rendering.' },
            { question: 'Can I convert multiple Excel files to PDF at once?', answer: 'Yes. Enable Batch Mode to upload multiple XLSX files and convert them all to PDF simultaneously.' }
          ],
          '/pdf-to-image': [
            { question: 'Should I choose JPG or PNG output format?', answer: 'Choose PNG for documents with text, charts, or sharp edges — PNG is lossless and renders text more cleanly. Choose JPG for photo-heavy PDFs where file size matters more.' },
            { question: 'Can I convert only specific pages instead of the entire PDF?', answer: 'Yes. Specify a start and end page number to extract only those pages as images. Enter the same number for both to extract a single page.' },
            { question: 'What resolution will the output images be?', answer: 'FileForge renders PDF pages at 150 DPI by default. Select high quality option for 300 DPI output — larger files but sharper images suitable for printing.' },
            { question: 'How are the converted images delivered?', answer: 'Converted images are available as a thumbnail grid for preview. Download all pages as a single ZIP file, or download individual pages by clicking thumbnails.' },
            { question: 'Can FileForge handle a 100-page PDF?', answer: 'Yes, but processing time scales with page count. A 100-page PDF typically takes 30-90 seconds. For faster results, process smaller page ranges at a time.' }
          ],
          '/pdf-to-word': [
            { question: 'Why does my converted Word document not look exactly like the PDF?', answer: 'PDF is a fixed-layout format while Word is flow-based. Converting between them interprets visual layout into structural format. FileForge extracts text content and basic formatting accurately.' },
            { question: 'Does PDF to Word work on scanned PDFs?', answer: 'Scanned PDFs contain images of pages, not actual text. FileForge extracts embedded text and cannot read text from scanned images. For scanned PDFs, use Google Drive free OCR feature.' },
            { question: 'Are tables preserved when converting PDF to Word?', answer: 'Simple tables are often preserved in structure but may lose precise formatting. Complex merged cell tables may not convert perfectly. Text content will be present and accurate.' },
            { question: 'Can I edit the converted Word document after downloading?', answer: 'Absolutely. The downloaded .docx file can be opened and edited in Microsoft Word, LibreOffice (free), or Google Docs (free by drag-dropping into Drive).' },
            { question: 'What is the maximum PDF size for Word conversion?', answer: 'FileForge handles PDFs up to approximately 50MB for Word conversion. Text-heavy PDFs convert quickly regardless of page count.' }
          ],
          '/merge-pdf': [
            { question: 'How many PDF files can I merge at once?', answer: 'FileForge allows merging up to 20 PDF files in a single operation. For more than 20 files, merge in groups then merge the results together.' },
            { question: 'Will merging PDFs reduce their quality?', answer: 'No. FileForge uses pdf-lib to merge PDFs at the structural level without recompressing content. The merged PDF is identical in quality to the originals.' },
            { question: 'Does the order of files in the merge matter?', answer: 'Yes. The merged PDF contains pages in exactly the order you arrange the files. Use drag handles to set your desired order before merging.' },
            { question: 'Can I choose which pages from each PDF to include?', answer: 'The Merge PDF tool combines complete PDF files. To select specific pages, first use the Split PDF tool to extract the pages you want, then merge the extracted PDFs.' },
            { question: 'My merged PDF is very large — can I compress it after merging?', answer: 'Yes. Download the merged PDF then upload it to FileForge PDF Compressor. Choose Medium or High compression to significantly reduce the file size.' }
          ],
          '/split-pdf': [
            { question: 'What are the different ways to split a PDF?', answer: 'FileForge offers three methods: Split by page range (specify exact ranges like 1-5, 6-10), Split every N pages (equal chunks), and Extract single pages (one PDF per page).' },
            { question: 'How do I extract just one page from a PDF?', answer: 'Use Split by page range and enter the same page number for both start and end. For example, page 5 to page 5 creates a single-page PDF of page 5.' },
            { question: 'Will the text and images stay sharp after splitting?', answer: 'Yes. Splitting does not recompress or alter any content. Pages are redistributed into new files at the document structure level without any re-rendering.' },
            { question: 'How are the split PDF files delivered?', answer: 'Split PDFs are packaged into a ZIP file. Files are named clearly: originalname_part_1.pdf, originalname_part_2.pdf, etc. Individual downloads are also available.' },
            { question: 'Can I split a password-protected PDF?', answer: 'Password-protected PDFs cannot be split because the content is encrypted. Remove the password protection first by opening in Chrome with the password, printing to PDF, then uploading the unprotected copy.' }
          ]
        };

        window.routes = {
          '/': showHomepage,
          '/pdf-compressor': () => showTool('pdf-compressor'),
          '/jpeg-compressor': () => showTool('jpeg-compressor'),
          '/image-resizer': () => showTool('image-resizer'),
          '/image-enhancer': () => showTool('image-enhancer'),
          '/jpg-to-pdf': () => showTool('jpg-to-pdf'),
          '/word-to-pdf': () => showTool('word-to-pdf'),
          '/excel-to-pdf': () => showTool('excel-to-pdf'),
          '/pdf-to-image': () => showTool('pdf-to-image'),
          '/pdf-to-word': () => showTool('pdf-to-word'),
          '/merge-pdf': () => showTool('merge-pdf'),
          '/split-pdf': () => showTool('split-pdf'),
          '/privacy': showPrivacyPage,
        };

        window.initRouter = function() {
          window.addEventListener('popstate', () => {
            const path = window.location.pathname
              .toLowerCase()
              .replace(/\/$/, '') || '/';
            window.updateSEO(path);  // ← MUST be here too
            handleRoute(path);
          });
        };

        window.handleRoute = function(path) {
          const normalizedPath = path.toLowerCase().replace(/\/$/, '') || '/';
          
          const handler = window.routes[normalizedPath];
          if (handler) {
            handler();
            updateActiveNavItem(normalizedPath);
            window.scrollTo({ top: 0, behavior: 'instant' });
          } else {
            show404Page();
          }
        };

        window.updateSEO = function(path) {
          // Normalize path
          const normalizedPath = path.toLowerCase()
            .replace(/\/$/, '') || '/';
          
          // Get SEO data for this path
          // Fall back to homepage data if path not found
          const seo = SEO_DATA[normalizedPath] || SEO_DATA['/'];
          
          // ---- STEP 6 — VERIFY WITH CONSOLE LOGS ----
          console.log('[FileForge SEO] Updating for path:', path);
          console.log('[FileForge SEO] Title:', seo.title);
          
          // ---- UPDATE TITLE ----
          document.title = seo.title;
          
          // ---- UPDATE META DESCRIPTION ----
          updateMetaTag('name', 'description', seo.description);
          
          // ---- UPDATE META KEYWORDS ----
          updateMetaTag('name', 'keywords', seo.keywords);
          
          // ---- UPDATE CANONICAL ----
          updateLinkTag('canonical', seo.canonical);
          
          // ---- UPDATE OPEN GRAPH ----
          updateMetaTag('property', 'og:title', seo.ogTitle);
          updateMetaTag('property', 'og:description', seo.ogDescription);
          updateMetaTag('property', 'og:url', seo.canonical);
          updateMetaTag('property', 'og:type', 'website');
          updateMetaTag('property', 'og:site_name', 'FileForge');
          updateMetaTag('property', 'og:image', 'https://fileforgepdf.netlify.app/og-image.png');
          updateMetaTag('property', 'og:image:width', '1200');
          updateMetaTag('property', 'og:image:height', '630');
          
          // ---- UPDATE TWITTER CARD ----
          updateMetaTag('name', 'twitter:card', 'summary_large_image');
          updateMetaTag('name', 'twitter:title', seo.ogTitle);
          updateMetaTag('name', 'twitter:description', seo.ogDescription);
          updateMetaTag('name', 'twitter:image', 'https://fileforgepdf.netlify.app/og-image.png');
          
          // ---- UPDATE STRUCTURED DATA ----
          updateStructuredData(seo.structuredData);
          
          // ---- ADD FAQ SCHEMA if tool page ----
          if (normalizedPath !== '/' && FAQ_DATA[normalizedPath]) {
            addFAQSchema(normalizedPath);
          }
        };

        // Helper — update or create meta tag
        function updateMetaTag(attrName, attrValue, content) {
          if (!content) return;
          
          let el = document.querySelector(
            `meta[${attrName}="${attrValue}"]`
          );
          
          if (!el) {
            el = document.createElement('meta');
            el.setAttribute(attrName, attrValue);
            document.head.appendChild(el);
          }
          
          el.setAttribute('content', content);
        }

        // Helper — update or create link tag
        function updateLinkTag(rel, href) {
          if (!href) return;
          
          let el = document.querySelector(`link[rel="${rel}"]`);
          
          if (!el) {
            el = document.createElement('link');
            el.setAttribute('rel', rel);
            document.head.appendChild(el);
          }
          
          el.setAttribute('href', href);
        }

        // Helper — update structured data JSON-LD
        // Always keeps our persistent main script formatted 
        function updateStructuredData(data) {
          if (!data) return;
          
          let el = document.getElementById('structured-data');
          
          if (!el) {
            el = document.createElement('script');
            el.id = 'structured-data';
            el.type = 'application/ld+json';
            document.head.appendChild(el);
          }
          
          el.textContent = JSON.stringify(data, null, 2);
        }

        // Helper — add FAQ schema alongside main schema
        function addFAQSchema(path) {
          const faqs = FAQ_DATA[path];
          if (!faqs || faqs.length === 0) return;
          
          const faqSchema = {
            '@context': 'https://schema.org',
            '@type': 'FAQPage',
            'mainEntity': faqs.map(faq => ({
              '@type': 'Question',
              'name': faq.question,
              'acceptedAnswer': {
                '@type': 'Answer',
                'text': faq.answer
              }
            }))
          };
          
          let el = document.getElementById('faq-structured-data');
          if (!el) {
            el = document.createElement('script');
            el.id = 'faq-structured-data';
            el.type = 'application/ld+json';
            document.head.appendChild(el);
          }
          
          el.textContent = JSON.stringify(faqSchema, null, 2);
        }

        window.showTool = function(toolId) {
          // Hide all panels
          document.querySelectorAll('.tool-panel').forEach(panel => {
            panel.style.display = 'none';
            panel.classList.remove('active');
          });
          
          const homepage = document.getElementById('homepage');
          if (homepage) homepage.style.display = 'none';
          
          const panel = document.getElementById('tool-' + toolId);
          if (panel) {
            panel.style.display = 'block';
            panel.classList.add('active');
          }
          
          updateSidebarActiveItem(toolId);
          
          const toolNames = {
            'pdf-compressor': 'PDF Compressor',
            'jpeg-compressor': 'JPEG Compressor',
            'image-resizer': 'Image Resizer',
            'image-enhancer': 'Image Enhancer',
            'jpg-to-pdf': 'JPG to PDF',
            'word-to-pdf': 'Word to PDF',
            'excel-to-pdf': 'Excel to PDF',
            'pdf-to-image': 'PDF to Image',
            'pdf-to-word': 'PDF to Word',
            'merge-pdf': 'Merge PDF',
            'split-pdf': 'Split PDF',
          };
          
          const breadcrumb = document.getElementById('breadcrumb');
          if (breadcrumb) {
            breadcrumb.innerHTML = `
              <span onclick="navigateTo('/')" 
                style="cursor:pointer; color:var(--text-muted); hover:color:var(--accent)">Home</span>
              <span style="color:var(--text-muted); margin:0 8px;">→</span>
              <span style="color:var(--text-primary)">
                \${toolNames[toolId] || toolId}
              </span>
            `;
          }

          // React app bridge delegation
          if (window.reactSetActiveTool) {
            window.reactSetActiveTool(toolId);
          }
        };

        window.showHomepage = function() {
          document.querySelectorAll('.tool-panel').forEach(panel => {
            panel.style.display = 'none';
            panel.classList.remove('active');
          });
          const homepage = document.getElementById('homepage');
          if (homepage) homepage.style.display = 'block';

          // React app bridge delegation
          if (window.reactSetActiveTool) {
            window.reactSetActiveTool('home');
          }
        };

        window.showPrivacyPage = function() {
          if (window.reactSetActiveTool) {
            window.reactSetActiveTool('privacy');
          }
        };

        window.navigateTo = function(path) {
          window.history.pushState({}, '', path);
          window.updateSEO(path);  // ← MUST be here
          window.handleRoute(path);
          window.scrollTo({ top: 0, behavior: 'instant' });
        };

        window.show404Page = function() {
          document.querySelectorAll('.tool-panel').forEach(p => {
            p.style.display = 'none';
          });
          const homepage = document.getElementById('homepage');
          if (homepage) homepage.style.display = 'none';
          
          let panel404 = document.getElementById('page-404');
          if (!panel404) {
            panel404 = document.createElement('div');
            panel404.id = 'page-404';
            panel404.innerHTML = `
              <div style="text-align:center; padding:80px 20px;">
                <div style="font-size:80px; margin-bottom:16px;">🔍</div>
                <h1 style="font-size:48px; color:var(--accent); 
                  font-family:'Plus Jakarta Sans',sans-serif; 
                  margin-bottom:16px;">404</h1>
                <p style="font-size:20px; color:var(--text-primary);
                  margin-bottom:8px;">Page not found</p>
                <p style="color:var(--text-muted); margin-bottom:32px;">
                  The tool you are looking for does not exist.</p>
                <button onclick="navigateTo('/')"
                  style="background:var(--accent); color:white;
                  border:none; padding:14px 28px; border-radius:10px;
                  font-size:15px; cursor:pointer; 
                  font-family:'Plus Jakarta Sans',sans-serif;">
                  ← Back to All Tools
                </button>
              </div>
            `;
            document.body.appendChild(panel404);
          }
          panel404.style.display = 'block';

          // React app bridge delegation
          if (window.reactSetActiveTool) {
            window.reactSetActiveTool('404');
          }
        };

        window.downloadRedirectsFile = function() {
          const content = '/* /index.html 200\\n';
          const blob = new Blob([content], { type: 'text/plain' });
          const a = document.createElement('a');
          const url = URL.createObjectURL(blob);
          a.href = url;
          a.download = '_redirects';
          a.click();
          URL.revokeObjectURL(url);
        };

        window.downloadSitemap = function() {
          const base = 'https://fileforgepdf.netlify.app';
          const today = new Date().toISOString().split('T')[0];
          
          const urls = [
            { loc: '/', priority: '1.0', freq: 'weekly' },
            { loc: '/pdf-compressor', priority: '0.9', freq: 'monthly' },
            { loc: '/jpeg-compressor', priority: '0.9', freq: 'monthly' },
            { loc: '/image-resizer', priority: '0.8', freq: 'monthly' },
            { loc: '/image-enhancer', priority: '0.8', freq: 'monthly' },
            { loc: '/jpg-to-pdf', priority: '0.9', freq: 'monthly' },
            { loc: '/word-to-pdf', priority: '0.9', freq: 'monthly' },
            { loc: '/excel-to-pdf', priority: '0.8', freq: 'monthly' },
            { loc: '/pdf-to-image', priority: '0.8', freq: 'monthly' },
            { loc: '/pdf-to-word', priority: '0.8', freq: 'monthly' },
            { loc: '/merge-pdf', priority: '0.9', freq: 'monthly' },
            { loc: '/split-pdf', priority: '0.8', freq: 'monthly' },
          ];
          
          let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
          xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';
          for (var i = 0; i < urls.length; i++) {
            var u = urls[i];
            xml += '  <url>\n';
            xml += '    <loc>' + base + u.loc + '</loc>\n';
            xml += '    <lastmod>' + today + '</lastmod>\n';
            xml += '    <changefreq>' + u.freq + '</changefreq>\n';
            xml += '    <priority>' + u.priority + '</priority>\n';
            xml += '  </url>\n';
          }
          xml += '</urlset>';

          window.triggerDownload(xml, 'sitemap.xml', 'application/xml');
        };

        window.downloadRobotsTxt = function() {
          const content = 
`User-agent: *
Allow: /
Sitemap: https://fileforgepdf.netlify.app/sitemap.xml`;
          
          window.triggerDownload(content, 'robots.txt', 'text/plain');
        };

        window.triggerDownload = function(content, filename, type) {
          const blob = new Blob([content], { type: type });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(a.href);
        };

        window.updateSidebarActiveItem = function(toolId) {
          document.querySelectorAll('.sidebar-item, .tool-link').forEach(item => {
            item.classList.remove('active');
          });
          
          const activeItem = document.querySelector(
            `[data-path="/${toolId}"], [data-tool="${toolId}"], [data-navigate="/${toolId}"]`
          );
          if (activeItem) {
            activeItem.classList.add('active');
            activeItem.scrollIntoView({ 
              behavior: 'smooth', 
              block: 'nearest' 
            });
          }
        };

        window.updateActiveNavItem = function(normalizedPath) {
          document.querySelectorAll('[data-navigate]').forEach(item => {
            const attr = item.getAttribute('data-navigate');
            if (attr === normalizedPath) {
              item.classList.add('active');
            } else {
              item.classList.remove('active');
            }
          });
        };

        document.addEventListener('DOMContentLoaded', () => {
          const path = window.location.pathname
            .toLowerCase()
            .replace(/\/$/, '') || '/';
          window.updateSEO(path);
          window.handleRoute(path);
          window.initRouter();
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
